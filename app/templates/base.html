<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- 全画面で共通して使用する文字コード・画面幅・CSS -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Face Practice{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 共通ヘッダー。ログイン中だけログアウトボタンを表示する -->
    <header class="site-header">
        <a class="brand" href="{{ url_for('auth.index') }}">Face Practice</a>
        {% if current_user.is_authenticated %}
            <form action="{{ url_for('auth.logout') }}" method="post">
                <button class="button button-ghost button-small" type="submit">ログアウト</button>
            </form>
        {% endif %}
    </header>

    <!-- 子テンプレートのblock contentが、この場所へ差し込まれる -->
    <main class="page-shell">{% block content %}{% endblock %}</main>

    <!-- 各画面専用のJavaScriptを、この場所で読み込む -->
    {% block scripts %}{% endblock %}
</body>
</html>
